services:
    # Nginx service
    web:
        image: nginx:alpine
        container_name: web
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ${WORKSPACE_PATH}:/var/www:cached
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
            - ./nginx/sites/:/etc/nginx/sites-available:ro
            - ./nginx/logs:/var/log/nginx
        depends_on:
            - php-fpm
        restart: always
        networks:
            - default

    #  PHP-FPM workspace for admin service
    php-fpm:
        build:
            context: ./php-fpm
            args:
                - PHP_VERSION=${PHP_VERSION}
                - NODEJS_VERSION=${NODEJS_VERSION}
                - TZ=${TIMEZONE}
        container_name: php-fpm
        ports:
            - "9000:9000"
        volumes:
            - ${WORKSPACE_PATH}:/var/www:cached
            - ./php-fpm/ini/php${PHP_VERSION}.ini:/usr/local/etc/php/php.ini
            - ${SSH_KEY_PATH}:/root/.ssh/id_rsa
            - ${SSH_KEY_PATH}.pub:/root/.ssh/id_rsa.pub:ro
            - ~/.ssh/known_hosts:/root/.ssh/known_hosts
            - ~/.gitconfig:/root/.gitconfig:ro
            - ./php-fpm/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/www.conf
            - ./php-fpm/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
            - ./php-fpm/conf.d/error_reporting.ini:/usr/local/etc/php/conf.d/error_reporting.ini
            - ~/.claude:/root/.claude
            - ~/.copilot:/root/.copilot

        extra_hosts:
            - "agent-api.local:host-gateway"
            - "cronjob.local:host-gateway"
            - "external-api.local:host-gateway"
            - "front-api.local:host-gateway"
            - "internal-api.local:host-gateway"
            - "socket-api.local:host-gateway"
            - "agent-web.local:host-gateway"
            - "socket-web.local:host-gateway"
            - "apis.local:host-gateway"
        tty: true
        networks:
            - default

    # PHP-Swoole workspace for api service
    api:
        build:
            context: ./php-swoole
        container_name: api
        platform: linux/x86_64
        volumes:
            - ${WORKSPACE_PATH}:/var/www:cached
        ports:
            - "9501:9501"
        tty: true
        networks:
            - default

    # MySQL database service
    mysql:
        platform: linux/amd64
        build:
            context: ./mysql
            args:
                - MYSQL_VERSION=${MYSQL_VERSION}
        container_name: mysql
        ports:
            - "${MYSQL_PORT}:3306"
        environment:
            - MYSQL_DATABASE=${MYSQL_DATABASE}
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            - TZ=${TIMEZONE}
        volumes:
            - ./mysql/data:/var/lib/mysql
            - ./mysql/log:/var/log/mysql
            - ./mysql/config:/etc/mysql/conf.d
        networks:
            - default

    #  PHP-FPM workspace for admin service
    php-fpm8:
        build:
            context: ./php-fpm8
            args:
                - PHP_VERSION=${PHP8_VERSION}
                - NODEJS_VERSION=${NODEJS_VERSION}
                - TZ=${TIMEZONE}
        container_name: php-fpm8
        ports:
            - "9001:9000"
        volumes:
            - ${WORKSPACE_PATH}:/var/www:cached
            - ./php-fpm8/ini/php${PHP8_VERSION}.ini:/usr/local/etc/php/php.ini
            - ${SSH_KEY_PATH}:/root/.ssh/id_rsa
            - ${SSH_KEY_PATH}.pub:/root/.ssh/id_rsa.pub:ro
            - ~/.ssh/known_hosts:/root/.ssh/known_hosts
            - ~/.gitconfig:/root/.gitconfig:ro
            - ./php-fpm8/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/www.conf
            - ./php-fpm8/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
            - ./php-fpm8/conf.d/error_reporting.ini:/usr/local/etc/php/conf.d/error_reporting.ini
            - ~/.claude:/root/.claude
            - ~/.copilot:/root/.copilot
            - ~/.config/gcloud:/root/.config/gcloud

        extra_hosts:
            - "agent-api.local:host-gateway"
            - "agent-web.local:host-gateway"
            - "cronjob.local:host-gateway"
            - "external-api.local:host-gateway"
            - "front-api.local:host-gateway"
            - "internal-api.local:host-gateway"
            - "socket-api.local:host-gateway"
            - "socket-web.local:host-gateway"
            - "apis.local:host-gateway"
        tty: true
        networks:
            - default

    mysql8:
        build:
            context: ./mysql8
            args:
                - MYSQL_VERSION=${MYSQL8_VERSION}
        container_name: mysql8
        ports:
            - "${MYSQL8_PORT}:3306"
        environment:
            - MYSQL_DATABASE=${MYSQL_DATABASE}
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            - TZ=${TIMEZONE}
        volumes:
            - ./mysql8/data:/var/lib/mysql
            - ./mysql8/log:/var/log/mysql
            - ./mysql8/config:/etc/mysql/conf.d
        networks:
            - default

    # Redis service
    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "${REDIS_PORT}:6379"
        networks:
            - default

    open-webui:
        image: ghcr.io/open-webui/open-webui:main
        container_name: open-webui
        restart: always
        ports:
            - "3000:8080"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - open-webui:/app/backend/data
        environment:
            - 'OLLAMA_BASE_URL=http://host.docker.internal:11434'
        networks:
            - default

